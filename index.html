<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión Documental</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Plataforma de Gestión Documental</h1>
    <p>Control de versiones, permisos y flujo de aprobación</p>
</header>

<section class="login">
    <h2>Iniciar Sesión</h2>
    <input type="text" placeholder="Usuario">
    <input type="password" placeholder="Contraseña">
    <button>Ingresar</button>
</section>

<section class="upload">
    <h2>Subir Documento</h2>
    <input type="file">
    <button>Subir</button>
</section>

<section class="documents">
    <h2>Documentos</h2>

    <div class="doc">
        <p><strong>Contrato.pdf</strong></p>
        <span>Versión: 2</span>
        <button>Ver</button>
        <button>Aprobar</button>
    </div>

    <div class="doc">
        <p><strong>Informe.docx</strong></p>
        <span>Versión: 1</span>
        <button>Ver</button>
        <button>Editar</button>
    </div>

</section>

</body>
</html>
