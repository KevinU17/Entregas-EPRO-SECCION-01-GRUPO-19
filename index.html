<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Gestión Documental</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- Usuario logueado -->
<div class="user">
    Usuario: Admin | Rol: Administrador
</div>

<header>
    <h1>Plataforma de Gestión Documental</h1>
    <p>Control de versiones, permisos y flujo de aprobación</p>
</header>

<nav>
    <ul>
        <li>Inicio</li>
        <li>Documentos</li>
        <li>Subir</li>
        <li>Usuarios</li>
    </ul>
</nav>

<section class="upload">
    <h2>Subir Documento</h2>
    <input type="file">
    <button>Subir</button>
</section>

<section class="documents">
    <h2>Gestión de Documentos</h2>

    <div class="doc">
        <p><strong>Contrato.pdf</strong></p>
        <span>Versión: 2</span>
        <span class="status aprobado">Aprobado</span><br><br>
        <button>Ver</button>
        <button>Aprobar</button>
    </div>

    <div class="doc">
        <p><strong>Informe.docx</strong></p>
        <span>Versión: 1</span>
        <span class="status pendiente">Pendiente</span><br><br>
        <button>Ver</button>
        <button>Editar</button>
    </div>

</section>

</body>
</html>
